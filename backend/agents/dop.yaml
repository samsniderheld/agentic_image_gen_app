name: dop
display_name: Director of Photography
description: Defines camera and shot specifications
type: llm_agent

model:
  provider: gemini
  name: gemini-3-flash-preview
  temperature: 0.7
  max_tokens: 1024

instruction: |
  You are a director of photography. Define: camera angle, shot type, framing,
  focal length feel, depth of field. Return a single terse paragraph. No preamble.

inputs:
  - name: enriched_prompt
    source: enriched_prompt
    fallback: original_prompt
  - name: style_brief
    source: style_brief
    optional: true

outputs:
  - name: shot_brief
    target: shot_brief

hitl:
  enabled: true
  review_stage: awaiting_dop_review
  output_label: Shot brief
  thinking_message: Setting up the shot...
  thinking_revise_message: Revising shot setup based on your feedback...
  approve_label: "✓ Approve"
  feedback_target: style_brief
  approval_message: Shot approved. Generating image...

name: planner
display_name: Planner
description: Expands user prompt into detailed creative brief
type: llm_agent

model:
  provider: gemini
  name: gemini-3-flash-preview
  temperature: 0.7
  max_tokens: 2048

instruction: |
  You are a creative planner for image generation. Expand the user's prompt into a
  detailed brief covering: subject, action, setting, mood, lighting, color palette.
  Return only the brief as a single paragraph. No preamble.

inputs:
  - name: original_prompt
    source: original_prompt

outputs:
  - name: enriched_prompt
    target: enriched_prompt

hitl:
  enabled: true
  review_stage: awaiting_planner_review
  output_label: Enriched prompt
  thinking_message: Planning your prompt...
  thinking_revise_message: Revising based on your feedback...
  approve_label: "✓ Approve"
  feedback_target: original_prompt
  approval_message: Approved. Moving to art direction...

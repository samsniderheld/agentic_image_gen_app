name: art_director
display_name: Art Director
description: Defines visual style and aesthetic direction
type: llm_agent

model:
  provider: gemini
  name: gemini-3-flash-preview
  temperature: 0.7
  max_tokens: 1024

instruction: |
  You are an art director. Define the visual style: medium (photo/painting/illustration/3D),
  color grading, texture, art movement. Return a single terse paragraph. No preamble.

inputs:
  - name: enriched_prompt
    source: enriched_prompt
    fallback: original_prompt

outputs:
  - name: style_brief
    target: style_brief

hitl:
  enabled: true
  review_stage: awaiting_art_director_review
  output_label: Style brief
  thinking_message: Defining visual style...
  thinking_revise_message: Revising style based on your feedback...
  approve_label: "✓ Approve"
  feedback_target: enriched_prompt
  approval_message: Style approved. Setting up the shot...

name: generator
display_name: Generator
description: Generates the image from combined prompts
type: generator_agent

model:
  provider: gemini
  name: gemini-3.1-flash-image-preview
  # name: gemini-3-pro-image-preview

inputs:
  - name: prompt
    source: enriched_prompt
    fallback: original_prompt
    combine_with: [style_brief, shot_brief]
    separator: "\n\n"
  - name: aspect_ratio
    source: aspect_ratio
    default: "1:1"
  - name: input_images
    source: input_images
    optional: true

outputs:
  - name: image
    target: image
    save_to_disk: outputs/00_initial.png

hitl:
  enabled: false
  review_stage: awaiting_image
  output_label: Generated Image
  thinking_message: Generating Image
  thinking_revise_message: Revising Image based on your feedback...
  approve_label: "✓ Approve"
  feedback_target: Image
  approval_message: Image approved. Generating video...

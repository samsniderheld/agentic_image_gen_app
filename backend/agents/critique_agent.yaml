name: CritiqueAgent
type: llm
model: gemini-3.1-pro-preview
description: Critiques the current image against the original prompt.
instruction: |
  The image path is in state key 'image_path'.
  The original prompt is in state key 'prompt'.
  Call the critique_image tool with these values.
  Do not output any explanation — just call the tool.
output_key: critique_json
tools:
  - critique_image
include_contents: none
